server:
  port: 8282

spring:
  application:
    name: llm-studio-mcp-server
  ai:
    mcp:
      server:
        type: SYNC
        name: llm-studio-mcp-server
        version: 1.0.0

# Web search configuration
mcp:
  search:
    # Maximum number of search results to return per query
    max-results: 10
    # Request timeout in seconds
    timeout: 30
  fetch:
    # Maximum content length (characters) to return from fetched pages
    max-content-length: 50000
    # Request timeout in seconds
    timeout: 30
    # User-Agent header for HTTP requests
    user-agent: "LMStudio-MCP/1.0 (Web Content Fetcher)"

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

# Application info for /actuator/info
info:
  app:
    name: LM Studio MCP Server
    description: MCP server providing AI tools for LM Studio
    version: 1.0.0
    tools: 50+

logging:
  level:
    com.llmstudio.mcp: DEBUG
    org.springframework.ai.mcp: DEBUG
